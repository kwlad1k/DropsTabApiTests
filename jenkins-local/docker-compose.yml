services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: dropstab-jenkins:local
    container_name: dropstab-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"      # Jenkins UI
      - "50000:50000"    # JNLP agents (unused locally but kept for completeness)
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./casc.yaml:/var/jenkins_home/casc/casc.yaml:ro
    environment:
      # JCasC config path (also baked into the Dockerfile, kept for clarity)
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc/casc.yaml
      # Admin user (defaults to admin/admin if .env not provided)
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      JENKINS_URL: ${JENKINS_URL:-http://localhost:8080/}
      # DropsTab credentials — values read from .env (gitignored)
      DROPSTAB_USER_NAME: ${DROPSTAB_USER_NAME:?Set DROPSTAB_USER_NAME in .env}
      DROPSTAB_USER_EMAIL: ${DROPSTAB_USER_EMAIL:?Set DROPSTAB_USER_EMAIL in .env}
      DROPSTAB_USER_PASSWORD: ${DROPSTAB_USER_PASSWORD:?Set DROPSTAB_USER_PASSWORD in .env}
      DROPSTAB_USER_TOKEN: ${DROPSTAB_USER_TOKEN:?Set DROPSTAB_USER_TOKEN in .env}
      DROPSTAB_PORTFOLIO_ID: ${DROPSTAB_PORTFOLIO_ID:?Set DROPSTAB_PORTFOLIO_ID in .env}
      # Telegram (optional — leave empty to disable; pipeline tolerates missing values)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Allure TestOps (optional — leave ALLURE_TESTOPS_TOKEN empty to disable upload)
      ALLURE_TESTOPS_ENDPOINT: ${ALLURE_TESTOPS_ENDPOINT:-https://allure.autotests.cloud}
      ALLURE_TESTOPS_TOKEN: ${ALLURE_TESTOPS_TOKEN:-}
      ALLURE_TESTOPS_PROJECT_ID: ${ALLURE_TESTOPS_PROJECT_ID:-4230}

volumes:
  jenkins_home:
    name: dropstab_jenkins_home
